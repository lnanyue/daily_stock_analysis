# A股自选股智能分析系统 - 运行设置
# 本文件存放非敏感的业务逻辑参数

# 1. 分析策略设置
analysis:
  mode: simple           # simple: 单模型分析, debate: 红蓝对垒辩论模式
  language: zh           # zh: 中文, en: 英文
  bias_threshold: 5.0    # 乖离率警告阈值 (%)
  news_window_days: 3    # 新闻搜索的时间窗口 (天)
  request_delay: 2.0     # LLM 请求间的强制延迟 (秒)
  integrity_retry: 1     # AI 结果缺失时的重试次数

# 2. 系统性能与并发
system:
  max_workers: 2         # 最大并行分析股票数 (建议 1-3)
  log_level: INFO        # DEBUG, INFO, WARNING, ERROR
  webui_enabled: false   # 是否启动 Web 界面
  webui_port: 8000

# 3. 通知偏好
notification:
  report_type: simple    # simple: 简报, full: 详细报告
  summary_only: false    # 是否仅发送汇总表 (不含个股详情)
  markdown_to_image: []  # 哪些渠道启用图片模式 (例如: ['wechat', 'feishu'])
  merge_email: false     # 是否合并多股分析结果到一封邮件

# 4. 数据获取
data:
  prefetch_quotes: true  # 是否预取实时行情
  cache_ttl: 600         # 实时数据缓存时长 (秒)
  eastmoney_patch: false # 是否启用东财接口兼容补丁
