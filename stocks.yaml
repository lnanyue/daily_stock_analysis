# A股自选股智能分析系统 - 股票配置文件
# 支持简单列表或按分组管理

# 方式 1: 直接列出股票代码 (简单模式)
# stocks:
#   - "600519"
#   - "000001"

# 方式 2: 分组管理 (高级模式)
groups:
  # 核心持仓
  core:
    - "600519" # 贵州茅台
    - "000001" # 平安银行
  
  # 观察名单
  watchlist:
    - "300750" # 宁德时代
    - "HK00700" # 腾讯控股
  
  # 美股指数
  indices:
    - "^IXIC" # 纳斯达克
    - "^DJI"  # 道琼斯
