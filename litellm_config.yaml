# ===================================
# LiteLLM Router 配置文件
# ===================================
# 注意：本文件定义了系统可用的所有 AI 模型。
# 密钥建议使用 "os.environ/变量名" 格式，系统会自动从 .env 读取。

model_list:
  # --- Google Gemini ---
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "os.environ/GEMINI_API_KEY"

  - model_name: gemini/gemini-2.0-flash # 别名
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "os.environ/GEMINI_API_KEY"

  # --- DeepSeek ---
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: "os.environ/DEEPSEEK_API_KEY"

  - model_name: deepseek/deepseek-chat # 别名
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: "os.environ/DEEPSEEK_API_KEY"

  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: "os.environ/DEEPSEEK_API_KEY"

  - model_name: deepseek/deepseek-reasoner # 别名
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: "os.environ/DEEPSEEK_API_KEY"

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
